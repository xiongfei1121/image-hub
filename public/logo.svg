<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="512" height="512" rx="128" fill="#6366f1"/>
  
  <!-- 熊的头部 -->
  <circle cx="256" cy="240" r="120" fill="#f5f5f5"/>
  
  <!-- 熊的耳朵 -->
  <circle cx="176" cy="140" r="40" fill="#f5f5f5"/>
  <circle cx="336" cy="140" r="40" fill="#f5f5f5"/>
  <circle cx="176" cy="140" r="24" fill="#d4d4d4"/>
  <circle cx="336" cy="140" r="24" fill="#d4d4d4"/>
  
  <!-- 熊的眼睛 -->
  <circle cx="216" cy="230" r="16" fill="#1f2937"/>
  <circle cx="296" cy="230" r="16" fill="#1f2937"/>
  <circle cx="220" cy="226" r="6" fill="#ffffff"/>
  <circle cx="300" cy="226" r="6" fill="#ffffff"/>
  
  <!-- 熊的鼻子 -->
  <ellipse cx="256" cy="270" rx="20" ry="16" fill="#1f2937"/>
  <ellipse cx="256" cy="268" rx="8" ry="6" fill="#6b7280"/>
  
  <!-- 熊的嘴巴 -->
  <path d="M 236 290 Q 256 310 276 290" stroke="#1f2937" stroke-width="4" fill="none" stroke-linecap="round"/>
  
  <!-- 相机图标 -->
  <g transform="translate(180, 320)">
    <!-- 相机主体 -->
    <rect x="0" y="20" width="152" height="100" rx="12" fill="#ffffff"/>
    <!-- 相机镜头 -->
    <circle cx="76" cy="70" r="32" fill="#6366f1"/>
    <circle cx="76" cy="70" r="24" fill="#4f46e5"/>
    <circle cx="76" cy="70" r="12" fill="#1f2937"/>
    <circle cx="80" cy="66" r="4" fill="#ffffff"/>
    <!-- 闪光灯 -->
    <rect x="12" y="28" width="24" height="16" rx="4" fill="#e5e7eb"/>
    <!-- 快门按钮 -->
    <circle cx="130" cy="36" r="8" fill="#6366f1"/>
  </g>
  
  <!-- 图片图标（右上角） -->
  <g transform="translate(340, 60)">
    <rect x="0" y="0" width="80" height="80" rx="8" fill="#ffffff" transform="rotate(15)"/>
    <rect x="8" y="8" width="64" height="64" rx="4" fill="#e5e7eb" transform="rotate(15)"/>
    <!-- 图片内容 -->
    <circle cx="28" cy="28" r="8" fill="#fbbf24" transform="rotate(15)"/>
    <path d="M 16 56 L 36 36 L 56 56 L 64 48" stroke="#10b981" stroke-width="4" fill="none" transform="rotate(15)"/>
  </g>
</svg>